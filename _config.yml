# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------

title: blank # the website title (if blank, full name will be used instead)
first_name: Jesus
middle_name:
last_name: Ait Idir Lahuerta
contact_note: >
  Email is the best way to reach me.
description: >
  Personal academic website of Jesus Ait Idir Lahuerta, applied mathematician
  working in mathematical biology, PDEs, numerical methods and optimal control.
footer_text: >
  Powered by <a href="https://jekyllrb.com/" target="_blank">Jekyll</a> with <a href="https://github.com/alshedivat/al-folio" target="_blank">al-folio</a> theme.
  Hosted by <a href="https://pages.github.com/" target="_blank">GitHub Pages</a>.
keywords: applied mathematics, mathematical biology, PDE, numerical analysis, optimal control, academic-website # add your own keywords or leave empty
lang: en # the language of your site (for example: en, fr, cn, ru, etc.)
icon: 🧬 # the emoji used as the favicon (alternatively, provide image name in /assets/img/)

url: https://jaitidir.github.io # the base hostname & protocol for your site — update if your GitHub username / domain differs
baseurl: # the subpath of your site, e.g. /blog/. Leave blank for root
last_updated: false
impressum_path:
back_to_top: true

# -----------------------------------------------------------------------------
# Theme
# -----------------------------------------------------------------------------
# Minimalist site — GitHub stats/trophies are not part of your 6 sections, so they're disabled below
# (repo_theme_* and repo_trophies only matter if you add a /repositories page later).
repo_theme_light: default
repo_theme_dark: dark
repo_trophies:
  enabled: false
  theme_light: flat
  theme_dark: gitdimmed

external_services:
  github_readme_stats_url: https://github-readme-stats.vercel.app
  github_profile_trophy_url: https://github-profile-trophy.vercel.app

# -----------------------------------------------------------------------------
# al-folio API (v1.x)
# -----------------------------------------------------------------------------

al_folio:
  api_version: 1
  style_engine: tailwind
  tailwind:
    version: 4.1.18
    preflight: false
    css_entry: assets/tailwind/app.css
  distill:
    engine: distillpub-template
    source: al-org-dev/distill-template#al-folio
    allow_remote_loader: true
  features:
    cv:
      enabled: false # no CV section requested — turn on if you later want a CV page
    distill:
      enabled: false # no distill-style long-form posts requested
  compat:
    bootstrap:
      enabled: false
      support_window: v1.0-v1.2
      deprecates_in: v1.3
      removed_in: v2.0
  upgrade:
    channel: stable
    auto_apply_safe_fixes: false

# -----------------------------------------------------------------------------
# Layout
# -----------------------------------------------------------------------------

navbar_fixed: true
footer_fixed: true
search_enabled: true
socials_in_search: true
posts_in_search: false # no blog, so nothing to index here
bib_search: true # keep — lets people search your Publications

# Dimensions
max_width: 860px # slightly narrower for a cleaner, minimalist feel

# -----------------------------------------------------------------------------
# Open Graph & Schema.org
# -----------------------------------------------------------------------------

serve_og_meta: true # nice to have for link previews when you share your site
serve_schema_org: true
og_image:

# -----------------------------------------------------------------------------
# Analytics and search engine verification
# -----------------------------------------------------------------------------

analytics:
  google:
  cronitor:
  pirsch:
  openpanel:

google_site_verification:
bing_site_verification:

# -----------------------------------------------------------------------------
# Blog — disabled (not one of your 6 sections)
# -----------------------------------------------------------------------------

blog_name:
blog_description:
lsi: false

pagination:
  enabled: false

related_blog_posts:
  enabled: false
  max_related: 5

giscus:
  repo:
  repo_id:
  category: Comments
  category_id:
  mapping: title
  strict: 1
  reactions_enabled: 1
  input_position: bottom
  dark_theme: dark
  light_theme: light
  emit_metadata: 0
  lang: en

disqus_shortname:

external_sources: []

# -----------------------------------------------------------------------------
# Newsletter — disabled (not requested)
# -----------------------------------------------------------------------------

newsletter:
  enabled: false
  endpoint:

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------
# Only what your 6 sections need:
#  - Publications -> handled by jekyll/scholar (papers.bib), not a collection
#  - Events (upcoming/past) -> "events" collection, split by date in your events page
#  - Teaching -> "teachings" collection

collections:
  events:
    output: true
  teachings:
    output: true

# -----------------------------------------------------------------------------
# Jekyll settings
# -----------------------------------------------------------------------------

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter_opts:
    css_class: "highlight"
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1

include: ["_pages"]
exclude:
  - al-folio-upgrade-report.md
  - bin/
  - CONTRIBUTING.md
  - CUSTOMIZE.md
  - Dockerfile
  - docker-compose.yml
  - docker-compose-slim.yml
  - docs/
  - FAQ.md
  - Gemfile
  - Gemfile.lock
  - INSTALL.md
  - LICENSE
  - lighthouse_results/
  - package.json
  - package-lock.json
  - _pages/about_einstein.md
  - purgecss.config.js
  - README.md
  - readme_preview/
  - gems/
  - migrations/
  - vendor
keep_files:
  - CNAME
  - .nojegkyll

theme: al_folio_core

# Plug-ins — trimmed to what a minimalist 6-section site (About Me, Research,
# Publications, Events, Teaching, Contact) actually needs. Blog, CV, distill,
# comments and newsletter plugins are removed; add them back if you change your mind.
plugins:
  - jekyll-3rd-party-libraries
  - jekyll-cache-bust
  - jekyll-email-protect
  - jekyll-get-json
  - jekyll-imagemagick
  - jekyll-link-attributes
  - jekyll-minifier
  - jekyll-regex-replace
  - jekyll/scholar
  - jekyll-sitemap
  - jekyll-socials
  - jekyll-tabs
  - jekyll-terser
  - jekyll-toc
  - jemoji

  # al-folio plugins
  - al_folio_core
  - al_icons
  - al_folio_upgrade
  - al_folio_bootstrap_compat
  - al_analytics
  - al_citations
  - al_img_tools
  - al_search
  - al_math

# Sitemap settings
defaults:
  - scope:
      path: "assets"
    values:
      sitemap: false

sass:
  style: compressed

# -----------------------------------------------------------------------------
# Jekyll Minifier
# -----------------------------------------------------------------------------

jekyll-minifier:
  compress_javascript: false # delegated to jekyll-terser (see below)
  # CSS is already minified upstream (Tailwind build + sass compressed style).
  # Re-minifying via cssminify2 mangles Tailwind v4 spacing tokens inside calc(),
  # so keep this disabled.
  compress_css: false
  exclude: ["robots.txt"]

# -----------------------------------------------------------------------------
# Terser
# -----------------------------------------------------------------------------

terser:
  compress:
    drop_console: true

# -----------------------------------------------------------------------------
# Jekyll Scholar (Publications section)
# -----------------------------------------------------------------------------

scholar:
  last_name: [Ait Idir Lahuerta]
  first_name: [Jesus, J.]

  style: apa
  locale: en

  source: /_bibliography/
  bibliography: papers.bib
  bibliography_template: bib
  bibtex_filters: [latex, smallcaps, superscript]

  replace_strings: true
  join_strings: true

  details_dir: bibliography
  details_link: Details

  query: "@*"
  group_by: year
  group_order: descending

enable_publication_badges:
  altmetric: true
  dimensions: true
  google_scholar: true
  inspirehep: false # remove if not relevant to your field

filtered_bibtex_keywords:
  [
    abbr,
    abstract,
    additional_info,
    altmetric,
    annotation,
    arxiv,
    award,
    award_name,
    bibtex_show,
    blog,
    code,
    dimensions,
    eprint,
    google_scholar_id,
    hal,
    html,
    inspirehep_id,
    pdf,
    pmid,
    poster,
    preview,
    selected,
    slides,
    supp,
    video,
    website,
  ]

max_author_limit: 3
more_authors_animation_delay: 10

enable_publication_thumbnails: true

# -----------------------------------------------------------------------------
# Jekyll Link Attributes
# -----------------------------------------------------------------------------

external_links:
  enabled: true
  rel: external nofollow noopener
  target: _blank
  exclude:

# -----------------------------------------------------------------------------
# Responsive WebP Images
# -----------------------------------------------------------------------------

imagemagick:
  enabled: true
  widths:
    - 480
    - 800
    - 1400
  input_directories:
    - assets/img/
  input_formats:
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".tiff"
    - ".gif"
  output_formats:
    webp: "-auto-orient -quality 85"

lazy_loading_images: true

# -----------------------------------------------------------------------------
# Optional Features
# -----------------------------------------------------------------------------

enable_google_verification: false
enable_bing_verification: false
enable_cookie_consent: false # not needed unless you add analytics that require consent
enable_masonry: false # no projects grid in your 6 sections
enable_math: true # keep — you'll want LaTeX rendering for Research/Publications
enable_tooltips: false
enable_darkmode: true
enable_navbar_social: false
enable_project_categories: false # no Projects section
enable_medium_zoom: true
enable_progressbar: true
enable_video_embedding: false

